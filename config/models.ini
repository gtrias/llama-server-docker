# llama-server curated model presets
# Only models listed here should be exposed when models-dir discovery is disabled.

[qwen35]
alias = qwen35
model = /root/.cache/llama.cpp/Qwen3.5-35B-A3B-UD-Q4_K_XL.gguf
mmproj = /root/.cache/llama.cpp/mmproj-35b-BF16.gguf
ctx-size = 122880
n-gpu-layers = -1
flash-attn = on
cache-type-k = q8_0
cache-type-v = q8_0
# Official Qwen 3.5 sampling: thinking mode, general tasks
# https://huggingface.co/Qwen/Qwen3.5-9B#best-practices
temp = 1.0
top-p = 0.95
top-k = 20
presence-penalty = 1.5
repeat-penalty = 1.0
parallel = 1
kv-unified = 1

[glm]
alias = glm
model = /root/.cache/llama.cpp/unsloth_GLM-4.7-Flash-REAP-23B-A3B-GGUF_GLM-4.7-Flash-REAP-23B-A3B-IQ4_NL.gguf
ctx-size = 131072
n-gpu-layers = -1
flash-attn = on
cache-type-k = q4_0
cache-type-v = q4_0
temp = 0.5
top-p = 0.95
repeat-penalty = 1.05
parallel = 1


