# Auto-offload configuration for model-manager.sh
# This file is read by the auto-offload scripts, NOT by llama-server

# Enable/disable auto-offload monitoring
enabled=true

# Unload model after X seconds of inactivity (default: 1800 = 30 minutes)
idle_timeout=1800

# How often to check for idle models in seconds (default: 60)
check_interval=60

# API endpoint
api_endpoint=http://localhost:11434/v1

# Usage tracking directory (relative to scripts directory)
last_used_dir=.model_last_used
